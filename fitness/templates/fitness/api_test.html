<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q Запросы API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .btn {
            padding: 10px 20px;
            margin: 5px;
            background: #1a237e;
            color: white;
            border: none;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            max-height: 400px;
            overflow-y: auto;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <h1>Q Запросы API</h1>
    
    <div>
        <button class="btn" onclick="getClassesWithBookings()">Занятия с записями (Q: OR)</button>
        <button class="btn" onclick="getActiveOnly()">Только активные (Q: AND+NOT)</button>
    </div>
    
    <div id="result" class="result" style="display: none;"></div>

    <script>
        const API_BASE = '/api';

        function showResult(data) {
            const element = document.getElementById('result');
            element.style.display = 'block';
            element.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }

        async function getClassesWithBookings() {
            try {
                const response = await fetch(`${API_BASE}/fitness-classes/?high_bookings=true`);
                const data = await response.json();
                showResult(data);
            } catch (error) {
                showResult({ error: error.message });
            }
        }

        async function getActiveOnly() {
            try {
                const response = await fetch(`${API_BASE}/memberships/?active_only=true`);
                const data = await response.json();
                showResult(data);
            } catch (error) {
                showResult({ error: error.message });
            }
        }
    </script>
</body>
</html>
