<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Фитнес-центр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a2332;
            color: #000000;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #000000;
        }

        .messages {
            margin-bottom: 20px;
            padding: 15px;
            background: #ffffff;
            border: 1px solid #000000;
            border-radius: 5px;
            list-style: none;
        }

        .messages li {
            color: #000000;
            margin-bottom: 5px;
        }

        form {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #000000;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #ffffff;
            border: 1px solid #000000;
            border-radius: 5px;
            color: #000000;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #000000;
            border-width: 2px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ffffff;
            color: #000000;
            border: 1px solid #000000;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button:hover {
            background: #f0f0f0;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #000000;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 15px;
            background: #ffffff;
            border: 1px solid #000000;
            border-radius: 3px;
            display: inline-block;
        }

        .links a:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Вход в систему</h1>
        
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit">Войти</button>
        </form>
        
        <div class="links">
            <a href="/">Главная</a>
            <a href="/admin/">Админка</a>
        </div>
    </div>
</body>
</html>
